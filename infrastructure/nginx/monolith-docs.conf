# Monolith Docs — NGINX reverse proxy config
# Copy to /etc/nginx/sites-available/monolith-docs.conf
# Then: ln -s /etc/nginx/sites-available/monolith-docs.conf /etc/nginx/sites-enabled/
# Then: sudo certbot --nginx -d docs-dev.monolithcrm.com  (or docs.monolithcrm.com for prod)

upstream onlyoffice {
    server 127.0.0.1:8080;
}

upstream api {
    server 127.0.0.1:3020;
}

server {
    listen 80;
    # server_name docs-dev.monolithcrm.com;  # Uncomment and set for your domain
    # Certbot will add the HTTPS redirect and TLS blocks automatically.

    # API endpoints
    location /health {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /editor/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OnlyOffice DocumentServer — editor assets and WebSocket
    location / {
        proxy_pass http://onlyoffice;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (required for real-time collaboration)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # OnlyOffice needs generous timeouts
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # File upload size — OnlyOffice can handle large documents
    client_max_body_size 100m;
}
