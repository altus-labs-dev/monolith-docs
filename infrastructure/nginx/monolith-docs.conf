# Monolith Docs — NGINX reverse proxy config
# Serves app.monolithdocs.com (public-facing editor + OnlyOffice assets)
# API endpoints are NOT exposed here — they go through Cloudflare Tunnel
#
# Setup:
#   1. Copy to /etc/nginx/sites-available/monolith-docs.conf
#   2. ln -s /etc/nginx/sites-available/monolith-docs.conf /etc/nginx/sites-enabled/
#   3. Place Cloudflare origin certificate at /etc/ssl/cloudflare/origin.pem
#   4. Place Cloudflare origin private key at /etc/ssl/cloudflare/origin.key
#   5. nginx -t && systemctl reload nginx

upstream onlyoffice {
    server 127.0.0.1:8080;
}

upstream api {
    server 127.0.0.1:3020;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name app.monolithdocs.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.monolithdocs.com;

    # Cloudflare origin certificate (15-year validity, no renewal needed)
    ssl_certificate /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers (defense in depth — also set by Fastify for API responses)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # BLOCK /api/* from public access — API calls go through Cloudflare Tunnel
    # (connect.monolithdocs.com and crm.monolithdocs.com)
    location /api/ {
        default_type application/json;
        return 403 '{"error":"API access is not available on this hostname"}';
    }

    # Health check — public for uptime monitoring
    location = /health {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Editor pages — served by Fastify, session-bound URLs
    location /editor/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # OnlyOffice DocumentServer — editor assets, JS API, and WebSocket
    location / {
        proxy_pass http://onlyoffice;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket support (required for real-time collaboration)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # OnlyOffice needs generous timeouts for long editing sessions
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # File upload size — OnlyOffice can handle large documents
    client_max_body_size 100m;
}
